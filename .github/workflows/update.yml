name: Actualizar convocatorias
on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC cada día
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      # El detalle de cada convocatoria es una llamada aparte y la API limita la
      # concurrencia: --workers 2 con reintentos es lo fiable. Por defecto el script
      # se queda solo con lo SOLICITABLE (concurrencia competitiva + actividad económica),
      # que es ~5% del feed; por eso recorremos muchas páginas del índice. ~6000 detalles ≈ 11 min.
      - run: python fetch_data.py --paginas 30 --page-size 200 --workers 2
      - name: Commit data
        run: |
          git config user.name "subvenciona-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f data/convocatorias.json
          git commit -m "data: actualización diaria $(date +%F)" || echo "sin cambios"
          git push

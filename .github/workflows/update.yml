name: Actualizar convocatorias
on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC cada día
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      # El detalle de cada convocatoria es una llamada aparte y la API limita la
      # concurrencia: --workers 2 con reintentos es lo fiable. Por defecto el script
      # se queda solo con lo SOLICITABLE (concurrencia competitiva + actividad económica),
      # que es ~5% del feed; por eso recorremos muchas páginas del índice. ~6000 detalles ≈ 11 min.
      - run: python fetch_data.py --paginas 30 --page-size 200 --workers 2
      # Genera las páginas de categoría SEO a partir del JSON ya escrito (no toca el fetch).
      - run: python build_pages.py
      - name: Commit data
        run: |
          git config user.name "subvenciona-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f data/convocatorias.json index.html subvenciones sitemap.xml robots.txt
          # Si no hay cambios que commitear, salir limpiamente (exit 0) y no intentar push.
          if git diff --cached --quiet; then
            echo "Sin cambios que commitear."
            exit 0
          fi
          git commit -m "data: actualización diaria $(date +%F)"
          # Recoger lo que haya cambiado en main mientras corría el fetch (~10 min),
          # reaplicando nuestro commit encima. Evita el rechazo del push.
          git pull --rebase origin main
          git push
